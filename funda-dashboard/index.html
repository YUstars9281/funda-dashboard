<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ファンダ判断フォーマット</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Helvetica Neue', Arial, 'Hiragino Sans', 'Yu Gothic UI', sans-serif;
  background: #0d1117;
  color: #e6edf3;
  min-height: 100vh;
}

/* ===== 全体 ===== */
.app-wrap { display: flex; min-height: 100vh; }
.main {
  flex: 1;
  min-width: 0;
  padding: 24px;
  padding-left: 84px;
}

/* ===== サイドバー ===== */
.sidebar-toggle {
  position: fixed;
  top: 16px;
  left: 16px;
  z-index: 220;
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 8px;
  padding: 8px 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: #8b949e;
  transition: .2s;
  box-shadow: 0 2px 10px rgba(0,0,0,.35);
}
.sidebar-toggle:hover { background: #21262d; color: #e6edf3; }
.sidebar-toggle .badge {
  background: #1f6feb;
  color: #fff;
  font-size: 11px;
  font-weight: 700;
  border-radius: 999px;
  padding: 1px 7px;
  min-width: 20px;
  text-align: center;
}

.sidebar-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.55);
  z-index: 180;
}
.sidebar-overlay.open { display: block; }

.sidebar {
  position: fixed;
  left: 0;
  top: 0;
  height: 100vh;
  width: 270px;
  z-index: 200;
  background: #010409;
  border-right: 1px solid #21262d;
  display: flex;
  flex-direction: column;
  transform: translateX(-100%);
  transition: transform .25s ease;
}
.sidebar.open { transform: translateX(0); }

.sidebar-header {
  padding: 14px 14px 10px;
  border-bottom: 1px solid #21262d;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.sidebar-title {
  font-size: 14px;
  font-weight: 700;
  color: #58a6ff;
}
.sidebar-sub {
  font-size: 11px;
  color: #6e7681;
  margin-top: 2px;
}
.sidebar-close {
  background: none;
  border: none;
  color: #6e7681;
  font-size: 18px;
  cursor: pointer;
  padding: 2px 6px;
  border-radius: 6px;
}
.sidebar-close:hover {
  background: #21262d;
  color: #e6edf3;
}
.sidebar-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
}
.sidebar-empty {
  padding: 20px 14px;
  font-size: 12px;
  color: #6e7681;
  text-align: center;
  line-height: 1.7;
}

/* ===== 保存項目 ===== */
.saved-item {
  padding: 10px 14px;
  border-bottom: 1px solid #21262d;
  transition: background .15s;
  display: flex;
  align-items: center;
  gap: 8px;
}
.saved-item:hover { background: #161b22; }
.saved-item.active {
  background: #0d2044;
  border-left: 3px solid #58a6ff;
}
.drag-handle {
  color: #3d4460;
  font-size: 16px;
  cursor: grab;
  user-select: none;
  flex-shrink: 0;
}
.drag-handle:active { cursor: grabbing; }

.saved-main {
  flex: 1;
  min-width: 0;
  cursor: pointer;
}
.saved-code {
  font-size: 13px;
  font-weight: 700;
  color: #e6edf3;
}
.saved-name {
  font-size: 11px;
  color: #8b949e;
  margin-top: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.saved-meta {
  font-size: 10px;
  color: #6e7681;
  margin-top: 4px;
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}
.saved-result {
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 999px;
  font-weight: 700;
}
.saved-result.pass { background: #0d2d1a; color: #3fb950; }
.saved-result.fail { background: #2d0d0d; color: #f85149; }
.saved-result.review { background: #2d2200; color: #d29922; }

.del-btn {
  background: none;
  border: none;
  color: #6e7681;
  font-size: 14px;
  cursor: pointer;
  padding: 5px 7px;
  border-radius: 6px;
  flex-shrink: 0;
}
.del-btn:hover {
  background: #2d0d0d;
  color: #f85149;
}
.saved-item.drag-over {
  border-top: 2px solid #58a6ff;
  background: #0d2044;
}

/* ===== 見出し ===== */
h1 {
  font-size: 22px;
  font-weight: 700;
  color: #58a6ff;
  margin-bottom: 8px;
  text-align: center;
}
.subtitle {
  text-align: center;
  color: #8b949e;
  font-size: 13px;
  margin-bottom: 22px;
  line-height: 1.7;
}

/* ===== モデルボタン・タブ ===== */
.model-bar {
  max-width: 860px;
  margin: 0 auto 10px;
  display: flex;
  gap: 4px;
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 8px;
  padding: 4px;
}
.model-btn {
  flex: 1;
  padding: 6px 4px;
  border-radius: 6px;
  border: none;
  background: transparent;
  color: #8b949e;
  font-family: monospace;
  font-size: 11px;
  font-weight: 700;
  cursor: pointer;
  transition: .2s;
}
.model-btn.active-blue {
  background: rgba(88,166,255,.18);
  color: #58a6ff;
}
.model-btn.active-gold {
  background: rgba(210,153,34,.18);
  color: #d29922;
}
.model-label {
  display: flex;
  align-items: center;
  padding: 0 8px;
  font-family: monospace;
  font-size: 10px;
  color: #6e7681;
  white-space: nowrap;
}

.tabs {
  max-width: 860px;
  margin: 0 auto 18px;
  display: flex;
  gap: 6px;
}
.tab-btn {
  flex: 1;
  padding: 10px 6px;
  border: 1px solid #30363d;
  border-radius: 8px;
  background: transparent;
  color: #8b949e;
  font-family: inherit;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: .2s;
}
.tab-btn.active {
  border-color: #1f6feb;
  background: rgba(31,111,235,.15);
  color: #58a6ff;
}

/* ===== 入力 ===== */
.input-row {
  max-width: 580px;
  margin: 0 auto 28px;
  display: flex;
  gap: 10px;
}
.input-row input {
  flex: 1;
  padding: 12px 16px;
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 8px;
  color: #e6edf3;
  font-size: 16px;
  outline: none;
  transition: border-color .2s;
}
.input-row input:focus { border-color: #58a6ff; }

.btn {
  padding: 12px 22px;
  background: #1f6feb;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: .2s;
  white-space: nowrap;
}
.btn:hover { background: #388bfd; }
.btn:disabled {
  background: #21262d;
  color: #6e7681;
  cursor: not-allowed;
}

/* ===== 保存バー ===== */
.save-bar {
  max-width: 860px;
  margin: 0 auto 16px;
  display: flex;
  justify-content: flex-end;
  align-items: center;
  gap: 10px;
}
.save-btn {
  padding: 8px 18px;
  background: #238636;
  color: #fff;
  border: none;
  border-radius: 7px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
}
.save-btn:hover { background: #2ea043; }
.save-btn:disabled {
  background: #21262d;
  color: #6e7681;
  cursor: not-allowed;
}
.save-done {
  color: #3fb950;
  font-size: 12px;
}

/* ===== ローディング ===== */
#loading {
  display: none;
  text-align: center;
  padding: 40px 20px;
}
.spinner {
  width: 42px;
  height: 42px;
  border: 3px solid #21262d;
  border-top-color: #58a6ff;
  border-radius: 50%;
  animation: spin .8s linear infinite;
  margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }

#loadingMsg {
  color: #e6edf3;
  font-size: 15px;
  font-weight: 700;
}
#loadingSub {
  color: #6e7681;
  font-size: 12px;
  margin-top: 6px;
}
.phase-bar {
  max-width: 400px;
  margin: 16px auto 0;
}
.phase-steps {
  display: flex;
  gap: 6px;
  justify-content: center;
  margin-bottom: 8px;
}
.phase-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: #21262d;
  transition: .4s;
}
.phase-dot.active { background: #58a6ff; }
.phase-dot.done { background: #238636; }
.phase-label {
  font-size: 11px;
  color: #6e7681;
  text-align: center;
}

/* ===== エラー ===== */
#errorBox {
  display: none;
  max-width: 580px;
  margin: 0 auto 20px;
  background: #2d0d0d;
  border: 1px solid #da3633;
  border-radius: 8px;
  padding: 14px 18px;
}
#errorTitle {
  color: #f85149;
  font-weight: 700;
  font-size: 14px;
  margin-bottom: 6px;
}
#errorDetail {
  color: #c9d1d9;
  font-size: 12px;
  line-height: 1.7;
  white-space: pre-wrap;
  word-break: break-word;
}
.retry-btn {
  margin-top: 10px;
  padding: 7px 16px;
  background: #da3633;
  color: white;
  border: none;
  border-radius: 6px;
  font-size: 12px;
  cursor: pointer;
}
.retry-btn:hover { background: #f85149; }

/* ===== 結果エリア ===== */
#results {
  display: none;
  max-width: 860px;
  margin: 0 auto;
}
.company-header {
  text-align: center;
  margin-bottom: 20px;
}
.company-name {
  font-size: 24px;
  font-weight: 700;
  color: #f0f6fc;
}
.company-sub {
  font-size: 13px;
  color: #8b949e;
  margin-top: 4px;
  line-height: 1.7;
}
.earnings-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-top: 8px;
  padding: 5px 14px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 700;
}
.earnings-badge.warn {
  background: #2d2200;
  border: 1px solid #d29922;
  color: #d29922;
}
.earnings-badge.ok {
  background: #0d1f12;
  border: 1px solid #238636;
  color: #3fb950;
}

/* ===== 指標 ===== */
.metrics-row {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 10px;
  margin-bottom: 8px;
}
.metric-card {
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 8px;
  padding: 10px;
  text-align: center;
}
.metric-label {
  font-size: 11px;
  color: #8b949e;
  margin-bottom: 4px;
}
.metric-value {
  font-size: 16px;
  font-weight: 700;
  color: #e6edf3;
}
.metric-bench {
  font-size: 10px;
  margin-top: 4px;
  border-top: 1px solid #21262d;
  padding-top: 4px;
}
.metric-bench.good { color: #3fb950; }
.metric-bench.warn { color: #d29922; }
.metric-bench.bad { color: #f85149; }

#metricsSources {
  display: none;
  margin: -10px auto 18px;
  max-width: 860px;
  padding: 0 4px;
}

/* ===== ステップ ===== */
.flow-hint {
  max-width: 860px;
  margin: 0 auto 16px;
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
  font-size: 11px;
  color: #6e7681;
}
.flow-tag {
  background: #21262d;
  border-radius: 4px;
  padding: 2px 8px;
}

.step-card {
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 10px;
  margin-bottom: 10px;
  overflow: hidden;
}
.step-card.pass { border-left: 4px solid #238636; }
.step-card.fail { border-left: 4px solid #da3633; }
.step-card.exception { border-left: 4px solid #d29922; }
.step-card.info { border-left: 4px solid #58a6ff; }
.step-card.tokimeki {
  border-left: 4px solid #ff79c6;
  border-top: 1px solid rgba(255,121,198,.45);
  border-right: 1px solid rgba(255,121,198,.45);
  border-bottom: 1px solid rgba(255,121,198,.45);
}
.step-card.loading-card {
  border-left: 4px solid #30363d;
  opacity: .55;
}
.step-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  cursor: pointer;
  user-select: none;
}
.step-num {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
  flex-shrink: 0;
  background: #21262d;
  color: #8b949e;
}
.pass .step-num { background: #238636; color: #fff; }
.fail .step-num { background: #da3633; color: #fff; }
.exception .step-num { background: #d29922; color: #fff; }
.info .step-num { background: #1f6feb; color: #fff; }
.tokimeki .step-num { background: #e0569e; color: #fff; }

.step-info {
  flex: 1;
  min-width: 0;
}
.step-name {
  font-size: 14px;
  font-weight: 700;
  color: #e6edf3;
}
.step-crit {
  font-size: 11px;
  color: #8b949e;
  margin-top: 2px;
}
.step-val {
  font-size: 14px;
  font-weight: 700;
  white-space: nowrap;
}
.pass .step-val { color: #3fb950; }
.fail .step-val { color: #f85149; }
.exception .step-val { color: #d29922; }
.info .step-val { color: #58a6ff; }
.tokimeki .step-val { color: #ff79c6; }

.step-badge {
  font-size: 17px;
  flex-shrink: 0;
}
.step-arrow {
  color: #8b949e;
  font-size: 10px;
  transition: transform .2s;
  flex-shrink: 0;
}
.step-arrow.open { transform: rotate(90deg); }

.step-body {
  padding: 0 16px 14px 54px;
  font-size: 13px;
  color: #8b949e;
  line-height: 1.8;
  display: none;
}
.step-body.open { display: block; }

.exc-note {
  background: #2d2200;
  border: 1px solid rgba(210,153,34,.25);
  border-radius: 6px;
  padding: 8px 12px;
  margin-top: 8px;
  font-size: 12px;
  color: #d29922;
}

/* ===== ときめき・PL ===== */
.tokimeki-box {
  background: linear-gradient(135deg, #2a0f30, #1a0a22);
  border: 1px solid rgba(255,121,198,.35);
  border-radius: 8px;
  padding: 14px;
  margin-top: 4px;
}
.tokimeki-title {
  font-size: 15px;
  color: #ff79c6;
  font-weight: 700;
  margin-bottom: 8px;
}
.tokimeki-text {
  color: #c9d1d9;
  line-height: 1.8;
  font-size: 13px;
}
@keyframes heartbeat {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.35); }
}
.heart {
  display: inline-block;
  animation: heartbeat .9s ease-in-out infinite;
}
.biz-box {
  color: #c9d1d9;
  line-height: 1.8;
  white-space: pre-wrap;
  font-size: 13px;
}
.dream-bar {
  margin-top: 12px;
  background: #0d1117;
  border: 1px solid #21262d;
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 12px;
  color: #8b949e;
}
.sub-list {
  margin-top: 10px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.sub-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  background: #0d1117;
  border: 1px solid #21262d;
  border-radius: 6px;
  padding: 8px 12px;
}
.sub-item.pass { border-left: 3px solid #238636; }
.sub-item.fail { border-left: 3px solid #da3633; }
.sub-item.warn { border-left: 3px solid #d29922; }
.sub-badge {
  font-size: 14px;
  flex-shrink: 0;
  margin-top: 1px;
}
.sub-content {
  flex: 1;
  min-width: 0;
}
.sub-name {
  font-size: 12px;
  font-weight: 700;
  color: #c9d1d9;
}
.sub-check {
  font-size: 11px;
  color: #6e7681;
}
.sub-note {
  font-size: 12px;
  color: #8b949e;
  margin-top: 3px;
}

/* ===== ソースリンク ===== */
.sources-box {
  margin-top: 10px;
  padding-top: 8px;
  border-top: 1px solid #21262d;
}
.sources-label {
  font-size: 11px;
  color: #6e7681;
  margin-bottom: 4px;
}
.source-link {
  display: inline-block;
  margin: 2px 4px 2px 0;
  font-size: 11px;
  color: #58a6ff;
  text-decoration: none;
  background: #0d2044;
  border: 1px solid rgba(31,111,235,.25);
  border-radius: 4px;
  padding: 2px 8px;
}
.source-link:hover { background: rgba(31,111,235,.18); }

/* ===== 総合判定 ===== */
.overall {
  max-width: 860px;
  margin: 18px auto 0;
  padding: 18px 20px;
  border-radius: 10px;
  text-align: center;
}
.overall.pass {
  background: #0d2d1a;
  border: 1px solid #238636;
}
.overall.fail {
  background: #2d0d0d;
  border: 1px solid #da3633;
}
.overall.review {
  background: #2d2200;
  border: 1px solid #d29922;
}
.overall-title {
  font-size: 17px;
  font-weight: 700;
}
.overall.pass .overall-title { color: #3fb950; }
.overall.fail .overall-title { color: #f85149; }
.overall.review .overall-title { color: #d29922; }
.overall-comment {
  font-size: 13px;
  color: #8b949e;
  margin-top: 6px;
  line-height: 1.7;
}

/* ===== 決算タブ ===== */
#panel-earnings {
  display: none;
  max-width: 860px;
  margin: 0 auto;
}
.earn-section {
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 10px;
  margin-bottom: 16px;
  overflow: hidden;
}
.earn-sec-h {
  padding: 12px 16px;
  border-bottom: 1px solid #21262d;
  display: flex;
  align-items: center;
  gap: 10px;
}
.earn-sec-ico {
  width: 26px;
  height: 26px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  flex-shrink: 0;
}
.earn-sec-ttl {
  font-size: 14px;
  font-weight: 700;
}
.earn-body { padding: 14px 16px; }

.earn-label {
  font-size: 12px;
  color: #8b949e;
  margin-bottom: 5px;
}
.earn-select,
.earn-input {
  width: 100%;
  background: #21262d;
  border: 1px solid #30363d;
  border-radius: 7px;
  padding: 9px 11px;
  color: #e6edf3;
  font-size: 13px;
  outline: none;
  margin-bottom: 10px;
}
.earn-select:focus,
.earn-input:focus { border-color: #58a6ff; }

.use-type-row {
  display: flex;
  gap: 8px;
  margin-bottom: 10px;
}
.use-type-btn {
  flex: 1;
  padding: 8px 4px;
  border: 1px solid #30363d;
  border-radius: 7px;
  background: transparent;
  color: #8b949e;
  font-size: 12px;
  cursor: pointer;
  transition: .15s;
}
.use-type-btn.on {
  background: rgba(31,111,235,.15);
  border-color: #1f6feb;
  color: #58a6ff;
  font-weight: 700;
}

.upload-area {
  border: 2px dashed #30363d;
  border-radius: 10px;
  padding: 28px 16px;
  text-align: center;
  cursor: pointer;
  transition: .2s;
  margin-bottom: 10px;
}
.upload-area:hover,
.upload-area.drag {
  border-color: #58a6ff;
  background: rgba(31,111,235,.05);
}
.upload-area-ico {
  font-size: 28px;
  margin-bottom: 8px;
}
.upload-area-txt {
  font-size: 13px;
  color: #8b949e;
  margin-bottom: 4px;
}
.upload-area-sub {
  font-size: 11px;
  color: #6e7681;
}
#earnFileInput { display: none; }

.file-item {
  display: flex;
  align-items: center;
  gap: 10px;
  background: #21262d;
  border: 1px solid #30363d;
  border-radius: 7px;
  padding: 9px 12px;
  margin-bottom: 6px;
}
.file-ico { font-size: 18px; flex-shrink: 0; }
.file-name {
  flex: 1;
  font-size: 12px;

.file-size {

.file-del {

.earn-run-btn {

  border-radius: 10px;
  color: #58a6ff;
  font-family: inherit;
  font-size: 15px;

.earn-spinner {

.earn-err {

  border: 1px solid rgba(255,69,96,.25);
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 12px;
  color: #f85149;
  display: none;

}
.earn-err.on { display: block; }

.earn-kpi-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 14px;
}
.earn-kpi {
  border-radius: 9px;
  padding: 14px;
  border: 1px solid #30363d;
}
.earn-kpi.pass {
  background: rgba(35,134,54,.08);
  border-color: rgba(35,134,54,.35);
}
.earn-kpi.fail {
  background: rgba(218,54,51,.08);
  border-color: rgba(218,54,51,.35);
}
.earn-kpi.watch {
  background: rgba(210,153,34,.08);
  border-color: rgba(210,153,34,.3);
}
.earn-kpi-label {
  font-size: 11px;
  color: #8b949e;
  margin-bottom: 4px;
}
.earn-kpi-val {
  font-size: 19px;
  font-weight: 700;
  margin-bottom: 3px;
}
.earn-kpi.pass .earn-kpi-val { color: #3fb950; }
.earn-kpi.fail .earn-kpi-val { color: #f85149; }
.earn-kpi.watch .earn-kpi-val { color: #d29922; }
.earn-kpi-sub {
  font-size: 11px;
  color: #8b949e;
  line-height: 1.7;
}
.earn-kpi-badge {
  display: inline-block;
  font-size: 10px;
  padding: 2px 7px;
  border-radius: 999px;
  font-weight: 700;

}
.earn-kpi.pass .earn-kpi-badge { background: #0d2d1a; color: #3fb950; }
.earn-kpi.fail .earn-kpi-badge { background: #2d0d0d; color: #f85149; }
.earn-kpi.watch .earn-kpi-badge { background: #2d2200; color: #d29922; }

.diff-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
  margin-top: 4px;
}
.diff-table th {
  background: #21262d;
  color: #8b949e;
  padding: 6px 10px;
  text-align: left;
  font-size: 11px;
  font-weight: 700;
}
.diff-table td {
  padding: 8px 10px;
  border-bottom: 1px solid #21262d;
  color: #c9d1d9;
  vertical-align: top;
}
.diff-table tr:last-child td { border-bottom: none; }
.diff-up { color: #3fb950; font-weight: 700; }
.diff-down { color: #f85149; font-weight: 700; }
.diff-neutral { color: #8b949e; }

.earn-verdict {
  border-radius: 10px;
  padding: 18px 20px;
  text-align: center;

}
.earn-verdict.hold,
.earn-verdict.pass {
  background: #0d2d1a;

}
.earn-verdict.partial {

}
.earn-verdict.exit {

}
.earn-verdict.newbuy {

}
.earn-verdict-ico {

}
.earn-verdict-ttl {
  font-size: 17px;
  font-weight: 700;
  margin-bottom: 6px;
}
.earn-verdict.hold .earn-verdict-ttl,
.earn-verdict.pass .earn-verdict-ttl { color: #3fb950; }
.earn-verdict.partial .earn-verdict-ttl { color: #d29922; }
.earn-verdict.exit .earn-verdict-ttl { color: #f85149; }

.earn-action-box {

/* ===== 確認ダイアログ ===== */
#confirmOverlay {

  position: fixed;

  gap: 10px;
}
.confirm-btn {

  padding: 10px;
  border-radius: 8px;
  font-size: 13px;
  cursor: pointer;
}
.confirm-cancel {
  background: transparent;
  border: 1px solid #30363d;

  background: rgba(218,54,51,.15);
  border: 1px solid rgba(218,54,51,.4);
  color: #f85149;
  font-weight: 700;
}

/* ===== レスポンシブ ===== */
@media (max-width: 900px) {
  .metrics-row { grid-template-columns: repeat(3, 1fr); }
  .earn-kpi-grid { grid-template-columns: 1fr; }
}
@media (max-width: 640px) {
  .main { padding: 20px 14px 24px 14px; }
  .sidebar-toggle { position: static; margin: 12px auto 0; }
  .input-row { flex-direction: column; }
  .metrics-row { grid-template-columns: repeat(2, 1fr); }
  .step-header { align-items: flex-start; }
  .step-body { padding-left: 16px; }
}
</style>
</head>
<body>
<div class="app-wrap">

  <button class="sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()">
    📁 保存銘柄 <span class="badge" id="savedBadge">0</span>
  </button>

  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div>
        <div class="sidebar-title">📁 保存済み銘柄</div>

  <main class="main">

    <p class="subtitle">
      配当力・財務健全性・株主還元意識・PL品質を9ステップで確認
    </p>

    <div class="model-bar">
      <button id="model-sonnet" class="model-btn active-blue" onclick="setModel('sonnet')">Sonnet 4.6</button>
      <button id="model-opus" class="model-btn" onclick="setModel('opus')">Opus 4.6</button>
      <div class="model-label">使用モデル</div>
    </div>

    <div class="tabs">
      <button id="tab-btn-analysis" class="tab-btn active" onclick="switchMainTab('analysis')">📊 9ステップ分析</button>
      <button id="tab-btn-earnings" class="tab-btn" onclick="switchMainTab('earnings')">📄 決算分析</button>
    </div>

    <!-- ===== 9ステップ分析 ===== -->
    <section id="panel-analysis">
      <div class="input-row">
        <input id="codeInput" type="text" placeholder="証券コードを入力（例：7203）" maxlength="6">
        <button class="btn" id="analyzeBtn" onclick="runAnalysis()">分析スタート</button>
      </div>

      <div id="loading">
        <div class="spinner"></div>
        <div id="loadingMsg">準備中...</div>
        <div id="loadingSub"></div>
        <div class="phase-bar">
          <div class="phase-steps">
            <div class="phase-dot" id="dot0"></div>
            <div class="phase-dot" id="dot1"></div>
            <div class="phase-dot" id="dot2"></div>
          </div>
          <div class="phase-label" id="phaseLabel"></div>
        </div>

      <div id="errorBox">
        <div id="errorTitle">⚠️ エラーが発生しました</div>

      <div id="results">

          <span id="saveDone" class="save-done" style="display:none">✅ 保存しました</span>
          <button class="save-btn" id="saveBtn" onclick="saveResult()">💾 この分析を保存</button>
        </div>

        <div class="company-header">
          <div class="company-name" id="cName"></div>
          <div class="company-sub" id="cSub"></div>
          <div id="earningsBadge"></div>
        </div>

        <div class="metrics-row" id="metricsRow"></div>
        <div id="metricsSources"></div>

        <div class="flow-hint" id="flowHint"></div>
        <div id="stepsWrap"></div>

        <div class="overall" id="overall"></div>
      </div>
    </section>

    <!-- ===== 決算分析 ===== -->
    <section id="panel-earnings">
      <div class="earn-section">
        <div class="earn-sec-h">
          <div class="earn-sec-ico" style="background:rgba(88,166,255,.12)">🎯</div>
          <div class="earn-sec-ttl">分析対象銘柄</div>
        </div>
        <div class="earn-body">
          <div class="earn-label">使用目的</div>
          <div class="use-type-row">
            <button class="use-type-btn on" id="utype-hold" onclick="setUseType('hold')">📊 保有株の売買判断</button>
            <button class="use-type-btn" id="utype-new" onclick="setUseType('new')">🔍 新規候補の事前調査</button>

          <div class="earn-label">保存済み分析から選択（差分比較用・任意）</div>
          <select id="earnStockSelect" class="earn-select" onchange="onEarnStockSelect()">
            <option value="">── 選択なし（差分比較なし）──</option>

          <div class="earn-label">銘柄名（任意）</div>

        </div>
      </div>

      <div class="earn-section">
        <div class="earn-sec-h">
          <div class="earn-sec-ico" style="background:rgba(88,166,255,.12)">📄</div>
          <div class="earn-sec-ttl">決算資料アップロード</div>
          <span style="font-size:11px;color:#8b949e;margin-left:auto">PDF形式・最大2ファイル</span>
        </div>
        <div class="earn-body">
          <div class="upload-area" id="uploadArea"
               onclick="document.getElementById('earnFileInput').click()"
               ondragover="onDragOver(event)"
               ondragleave="onDragLeave(event)"
               ondrop="onDrop(event)">
            <div class="upload-area-ico">📂</div>
            <div class="upload-area-txt">クリックまたはドラッグ&ドロップ</div>
            <div class="upload-area-sub">決算短信・補足資料・決算説明資料など（PDF）</div>
          </div>
          <input type="file" id="earnFileInput" accept=".pdf" multiple onchange="onFileSelect(event)">
          <div id="fileList"></div>
        </div>

      <button class="earn-run-btn" id="earnRunBtn" onclick="runEarningsAnalysis()">
        <div class="earn-spinner" id="earnSp"></div>
        <span id="earnRunTxt">🤖 決算を分析する</span>
      </button>

      <div class="earn-err" id="earnErr"></div>
      <div id="earnResults" style="display:none;"></div>

<!-- ===== 確認ダイアログ ===== -->
<div id="confirmOverlay">
  <div class="confirm-box">
    <div class="confirm-icon">🗑</div>
    <div id="confirmMsg"></div>
    <div class="confirm-sub">この操作は取り消せません</div>
    <div class="confirm-actions">
      <button class="confirm-btn confirm-cancel" onclick="closeConfirm()">キャンセル</button>
      <button class="confirm-btn confirm-danger" id="confirmOkBtn">削除する</button>
    </div>
  </div>
</div>

<script>
/* ===== グローバル ===== */
var lastCode = '';
var currentData = null;
var activeKey = null;
var earnUseType = 'hold';
var earnFiles = [];
var currentModel = 'sonnet';
var allStocks = {};
var sidebarOrder = [];
var dragSrcKey = null;

/* ===== モデル定義（見た目用） ===== */
var MODELS = {
  sonnet: 'claude-sonnet-4-20250514',
  opus: 'claude-opus-4-20250514'
};

/* ===== 共通ユーティリティ ===== */
function escapeHtml(value) {
  return String(value == null ? '' : value)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function formatNowJa() {
  return new Date().toLocaleString('ja-JP', {
    year: 'numeric',
    month: '2-digit',
    day: '2-digit',
    hour: '2-digit',
    minute: '2-digit'
  });
}

function safeJsonParse(text, fallback) {
  try {
    return JSON.parse(text);
  } catch (e) {
    return fallback;
  }
}

/* ===== localStorage ===== */
function storageGetAll() {
  return safeJsonParse(localStorage.getItem('funda_all'), {});
}

function storageSetAll(records) {
  localStorage.setItem('funda_all', JSON.stringify(records));
}

function loadSidebarOrder() {
  sidebarOrder = safeJsonParse(localStorage.getItem('funda_order'), []);
  if (!Array.isArray(sidebarOrder)) sidebarOrder = [];
}

function saveSidebarOrder() {
  localStorage.setItem('funda_order', JSON.stringify(sidebarOrder));
}

function makeStorageKey(code, ts) {
  return (code || 'unknown') + '_' + ts;
}

function getSidebarOrder(keys) {
  var ordered = sidebarOrder.filter(function(k) {
    return keys.indexOf(k) !== -1;
  });
  keys.forEach(function(k) {
    if (ordered.indexOf(k) === -1) ordered.push(k);
  });
  return ordered;
}

/* ===== サイドバー ===== */
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('open');
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');
}

function refreshSidebar() {
  allStocks = storageGetAll() || {};
  var keys = Object.keys(allStocks);
  sidebarOrder = getSidebarOrder(keys);

  var list = document.getElementById('sidebarList');
  var countEl = document.getElementById('savedCount');
  var badgeEl = document.getElementById('savedBadge');

  badgeEl.textContent = keys.length;
  countEl.textContent = keys.length + '件';

  if (!keys.length) {
    list.innerHTML =
      '<div class="sidebar-empty">保存された銘柄はありません。<br>分析後に「保存」ボタンを押してください。</div>';
    return;
  }

  list.innerHTML = '';

  sidebarOrder.forEach(function(key) {
    var d = allStocks[key];
    if (!d) return;

    var result = d.overallResult || 'review';
    var resultLabel =
      result === 'pass' ? '✅ 通過' :
      result === 'fail' ? '❌ 未通過' : '⚠️ 要検討';

    var activeClass = key === activeKey ? ' active' : '';
    var el = document.createElement('div');
    el.className = 'saved-item' + activeClass;
    el.dataset.key = key;
    el.draggable = true;

    el.innerHTML =
      '<div class="drag-handle" title="ドラッグで並び替え">⠿</div>' +
      '<div class="saved-main" onclick="loadSaved(\'' + escapeHtml(key) + '\')">' +
        '<div class="saved-code">' + escapeHtml(d.stockCode || '—') + '</div>' +
        '<div class="saved-name">' + escapeHtml(d.companyName || '—') + '</div>' +
        '<div class="saved-meta">' +
          '<span class="saved-result ' + result + '">' + resultLabel + '</span>' +
          '<span>' + escapeHtml(d.savedAt || '') + '</span>' +
        '</div>' +
      '</div>' +
      '<button class="del-btn" onclick="deleteSaved(event,\'' + escapeHtml(key) + '\')" title="削除">🗑</button>';

    el.addEventListener('dragstart', onDragStart);
    el.addEventListener('dragover', onSidebarDragOver);
    el.addEventListener('dragleave', onSidebarDragLeave);
    el.addEventListener('drop', onSidebarDrop);
    el.addEventListener('dragend', onSidebarDragEnd);

    list.appendChild(el);
  });
}

function onDragStart(e) {
  dragSrcKey = this.dataset.key;
  this.style.opacity = '0.4';
  e.dataTransfer.effectAllowed = 'move';
}

function onSidebarDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  if (this.dataset.key !== dragSrcKey) this.classList.add('drag-over');
}

function onSidebarDragLeave() {
  this.classList.remove('drag-over');
}

function onSidebarDrop(e) {
  e.preventDefault();
  e.stopPropagation();
  this.classList.remove('drag-over');

  var targetKey = this.dataset.key;
  if (!dragSrcKey || dragSrcKey === targetKey) return;

  var si = sidebarOrder.indexOf(dragSrcKey);
  var ti = sidebarOrder.indexOf(targetKey);
  if (si === -1 || ti === -1) return;

  sidebarOrder.splice(si, 1);
  sidebarOrder.splice(ti, 0, dragSrcKey);

  saveSidebarOrder();
  refreshSidebar();
}

function onSidebarDragEnd() {
  this.style.opacity = '';
  var items = document.querySelectorAll('.saved-item');
  items.forEach(function(el) {
    el.classList.remove('drag-over');
  });
}

function loadSaved(key) {
  var records = storageGetAll();
  var d = records[key];
  if (!d) {
    alert('保存データの読み込みに失敗しました');
    return;
  }

  activeKey = key;
  currentData = d;

  closeSidebar();
  render(d);
  refreshSidebar();

  document.getElementById('saveBtn').disabled = true;
  document.getElementById('saveBtn').textContent = '✅ 保存済み';
}

function deleteSaved(e, key) {
  if (e) e.stopPropagation();

  showConfirm('この銘柄のデータを削除しますか？', function() {
    var records = storageGetAll();
    delete records[key];
    storageSetAll(records);

    if (activeKey === key) {
      activeKey = null;
      document.getElementById('saveBtn').disabled = false;
      document.getElementById('saveBtn').textContent = '💾 この分析を保存';
    }

    refreshSidebar();
  });
}

function saveResult() {
  if (!currentData) return;

  var key = activeKey;
  if (!key) {
    key = makeStorageKey(currentData.stockCode || 'unknown', Date.now());
  }

  currentData.savedAt = new Date().toLocaleDateString('ja-JP', {
    year: 'numeric',
    month: '2-digit',
    day: '2-digit'
  });

  var records = storageGetAll();
  records[key] = currentData;
  storageSetAll(records);

  activeKey = key;

  document.getElementById('saveBtn').disabled = true;
  document.getElementById('saveBtn').textContent = '✅ 保存済み';

  var done = document.getElementById('saveDone');
  done.style.display = 'inline';
  done.textContent = '✅ 保存しました';
  setTimeout(function() {
    done.style.display = 'none';
  }, 2500);

  refreshSidebar();
}

function enableSaveBtn() {
  var btn = document.getElementById('saveBtn');
  if (btn) {
    btn.disabled = false;
    btn.textContent = activeKey ? '💾 変更を保存' : '💾 この分析を保存';
  }
  var done = document.getElementById('saveDone');
  if (done) done.style.display = 'none';
}

/* ===== モデル切替 ===== */
function setModel(m) {
  currentModel = m;
  localStorage.setItem('funda_model', m);

  var sonnetBtn = document.getElementById('model-sonnet');
  var opusBtn = document.getElementById('model-opus');

  sonnetBtn.className = 'model-btn';
  opusBtn.className = 'model-btn';

  if (m === 'sonnet') {
    sonnetBtn.classList.add('active-blue');
  } else {
    opusBtn.classList.add('active-gold');
  }
}

/* ===== タブ切替 ===== */
function switchMainTab(tab) {
  document.getElementById('panel-analysis').style.display = tab === 'analysis' ? '' : 'none';
  document.getElementById('panel-earnings').style.display = tab === 'earnings' ? '' : 'none';

function calcOverall(steps) {
  var hasFail = false;
  var hasWarn = false;

  (steps || []).forEach(function(step) {
    if (!step) return;

    if (step.result === 'fail') hasFail = true;
    if (step.result === 'exception' || step.result === 'warn') hasWarn = true;

    if (step.subItems && Array.isArray(step.subItems)) {
      step.subItems.forEach(function(sub) {
        if (!sub) return;
        if (sub.result === 'fail') hasFail = true;
        if (sub.result === 'warn') hasWarn = true;
      });
    }
  });

  if (hasFail) return 'fail';
  if (hasWarn) return 'review';
  return 'pass';
}

/* ===== バックエンド接続用関数（キーはここに書かない） ===== */
async function analyzeWithBackend(code) {
  if (!APP_CONFIG.backendAnalyzeUrl) {
    throw new Error('バックエンドURLが未設定です。先に setBackendUrls() で analyze URL を設定してください。');
  }

  var res = await fetch(APP_CONFIG.backendAnalyzeUrl, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      stockCode: code,
      model: currentModel
    })
  });

  var data = await res.json();

  if (!res.ok) {
    throw new Error((data && data.error) || 'バックエンド分析に失敗しました');
  }

  if (!data || !data.result) {
    throw new Error('バックエンド応答が不正です');
  }

  return data.result;
}

/* ===== 分析実行 ===== */
async function runAnalysis() {
  var code = document.getElementById('codeInput').value.trim();
  if (!code) {
    alert('証券コードを入力してください');
    return;
  }

  lastCode = code;
  currentData = null;
  activeKey = null;

  document.getElementById('results').style.display = 'none';
  document.getElementById('errorBox').style.display = 'none';
  document.getElementById('loading').style.display = 'block';
  document.getElementById('analyzeBtn').disabled = true;
  document.getElementById('saveBtn').disabled = false;
  document.getElementById('saveBtn').textContent = '💾 この分析を保存';
  document.getElementById('saveDone').style.display = 'none';

  try {
    setPhase(0);
    setMsg('財務データを取得中...', 'STEP 1〜6 を分析しています（' + MODELS[currentModel] + '）');

    var result;

    if (APP_CONFIG.analysisMode === 'backend') {
      setPhase(1);
      setMsg('バックエンド経由で分析中...', '安全なAPI接続を使用しています');
      result = await analyzeWithBackend(code);
    } else {
      await fakeDelay(550);
      setPhase(1);
      setMsg('IR・ビジネスモデルを分析中...', 'STEP 7〜9 を分析しています');
      await fakeDelay(650);
      setPhase(2);
      setMsg('結果をまとめています...', 'ダミーデータで描画しています');
      await fakeDelay(350);
      result = buildDummyAnalysisData(code);
    }

    result.overallResult = result.overallResult || calcOverall(result.steps || []);
    currentData = result;

    document.getElementById('loading').style.display = 'none';
    document.getElementById('analyzeBtn').disabled = false;

    render(result);
  } catch (e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('analyzeBtn').disabled = false;
    showError('【使用モード: ' + APP_CONFIG.analysisMode + '】\n' + (e.message || e));
  }
}

/* ===== 決算予定表示 ===== */
function parseEarningsDate(str) {
  if (!str) return null;

  var s = String(str);
  var m;

  m = s.match(/(\d{4})年(\d{1,2})月(\d{1,2})日/);
  if (m) return new Date(+m[1], +m[2] - 1, +m[3]);

  m = s.match(/(\d{4})年(\d{1,2})月(上旬|中旬|下旬)?/);
  if (m) {
    var day = m[3] === '下旬' ? 25 : m[3] === '中旬' ? 15 : 5;
    return new Date(+m[1], +m[2] - 1, day);
  }

  return null;
}

function renderEarningsBadge(nextEarnings) {
  var el = document.getElementById('earningsBadge');
  if (!el) return;

  if (!nextEarnings) {
    el.innerHTML = '';
    return;
  }

  var now = new Date();
  var warningMs = 21 * 24 * 60 * 60 * 1000;
  var earnDate = parseEarningsDate(nextEarnings);
  var isClose = earnDate && (earnDate - now) >= 0 && (earnDate - now) <= warningMs;

  el.innerHTML =
    '<div class="earnings-badge ' + (isClose ? 'warn' : 'ok') + '">' +
      '📅 次回決算: ' + escapeHtml(nextEarnings) + (isClose ? ' ⚠ 3週間以内' : '') +
    '</div>';
}

        '<div class="tokimeki-text">' + escapeHtml(step.detail || '—') + '</div>' +
      '</div>';
  } else if (step.id === 8) {
    body =
      '<div class="biz-box">' + escapeHtml(step.detail || '—') + '</div>' +
      '<div class="dream-bar">⏱ 推奨妄想時間: 1時間　🧠 競合優位性・収益構造・成長ドライバーを思う存分妄想しましょう</div>';
  } else if (step.id === 9 && step.subItems) {
    var subHtml = step.subItems.map(function(sub) {
      return '' +
        '<div class="sub-item ' + (sub.result || 'warn') + '">' +
          '<span class="sub-badge">' + (SUBBADGE[sub.result] || '⬜') + '</span>' +
          '<div class="sub-content">' +
            '<div class="sub-name">' + escapeHtml(sub.name || '') + '</div>' +
            '<div class="sub-check">判定基準: ' + escapeHtml(sub.check || '') + '</div>' +
            '<div class="sub-note">' + escapeHtml(sub.note || '—') + '</div>' +
          '</div>' +
        '</div>';
    }).join('');

    body =
      '<p style="margin-bottom:8px;color:#8b949e;font-size:13px;">' + escapeHtml(step.detail || '') + '</p>' +
      '<div class="sub-list">' + subHtml + '</div>';
  } else {
    body = '<p>' + escapeHtml(step.detail || '—') + '</p>';
    if (step.isException && step.exceptionReason) {
      body += '<div class="exc-note">⚠️ 例外適用: ' + escapeHtml(step.exceptionReason) + '</div>';
    }
  }

  if (step.sources && step.sources.length) {
    var links = step.sources
      .filter(function(src) { return src.url && src.url.indexOf('http') === 0; })
      .map(function(src) {
        return '<a class="source-link" href="' + escapeHtml(src.url) + '" target="_blank" rel="noopener">🔗 ' + escapeHtml(src.title || '参照元') + '</a>';
      })
      .join('');

    if (links) {
      body +=
        '<div class="sources-box">' +
          '<div class="sources-label">参照ソース</div>' +
          links +
        '</div>';
    }
  }

  return '' +
    '<div class="step-card ' + cls + '">' +
      '<div class="step-header" onclick="toggleBody(' + step.id + ')">' +
        '<div class="step-num">' + step.id + '</div>' +
        '<div class="step-info">' +
          '<div class="step-name">' + escapeHtml(step.name || '') + '</div>' +
          '<div class="step-crit">' + escapeHtml(step.criterion || '') + '</div>' +
        '</div>' +
        '<div class="step-val">' + escapeHtml(step.value || '—') + '</div>' +
        '<span class="step-badge">' + badge + '</span>' +
        '<span class="step-arrow open" id="a' + step.id + '">▶</span>' +
      '</div>' +
      '<div class="step-body open" id="b' + step.id + '">' + body + '</div>' +
    '</div>';
}

/* ===== PDFアップロード ===== */
function onDragOver(e) {
  e.preventDefault();
  document.getElementById('uploadArea').classList.add('drag');
}

function onDragLeave() {
  document.getElementById('uploadArea').classList.remove('drag');
}

function onDrop(e) {
  e.preventDefault();
  document.getElementById('uploadArea').classList.remove('drag');
  addFiles(Array.from(e.dataTransfer.files || []));
}

function onFileSelect(e) {
  addFiles(Array.from(e.target.files || []));
  e.target.value = '';
}

function addFiles(files) {
  files.forEach(function(file) {
    if (file.type !== 'application/pdf') {
      alert(file.name + ' はPDFではありません');
      return;
    }
    if (earnFiles.length >= 2) {
      alert('アップロードは最大2ファイルです');
      return;
    }
    if (earnFiles.some(function(x) { return x.name === file.name && x.size === file.size; })) {
      return;
    }
    earnFiles.push(file);
  });
  renderFileList();
}

function removeFile(idx) {
  earnFiles.splice(idx, 1);
  renderFileList();
}

function renderFileList() {
  var el = document.getElementById('fileList');
  el.innerHTML = '';

  earnFiles.forEach(function(file, i) {
    var kb = Math.round(file.size / 1024);
    el.innerHTML += '' +
      '<div class="file-item">' +
        '<div class="file-ico">📄</div>' +
        '<div class="file-name">' + escapeHtml(file.name) + '</div>' +
        '<div class="file-size">' + kb + 'KB</div>' +
        '<button class="file-del" onclick="removeFile(' + i + ')">✕</button>' +
      '</div>';
  });
}

async function analyzeEarningsWithBackend(payload) {
  if (!APP_CONFIG.backendEarningsUrl) {
    throw new Error('バックエンドURLが未設定です。先に setBackendUrls() で earnings URL を設定してください。');
  }

  var formData = new FormData();
  formData.append('stockCode', payload.stockCode || '');
  formData.append('companyName', payload.companyName || '');
  formData.append('useType', payload.useType || 'hold');
  formData.append('model', currentModel);

  if (payload.pastData) {
    formData.append('pastData', JSON.stringify(payload.pastData));
  }

  (payload.files || []).forEach(function(file, i) {
    formData.append('file' + i, file);
  });

  var res = await fetch(APP_CONFIG.backendEarningsUrl, {
    method: 'POST',
    body: formData
  });

  var data = await res.json();

  if (!res.ok) {
    throw new Error((data && data.error) || 'バックエンド決算分析に失敗しました');
  }

  if (!data || !data.result) {
    throw new Error('バックエンド応答が不正です');
  }

  return data.result;
}

/* ===== 決算分析実行 ===== */
async function runEarningsAnalysis() {
  if (earnFiles.length === 0) {
    document.getElementById('earnErr').textContent = 'PDFファイルを1つ以上アップロードしてください';
    document.getElementById('earnErr').classList.add('on');
    return;
  }

  document.getElementById('earnErr').classList.remove('on');

  var stockCode = document.getElementById('earnCode').value.trim();
  var companyName = document.getElementById('earnName').value.trim();
  var selectedKey = document.getElementById('earnStockSelect').value;

  var pastData = null;
  if (selectedKey) {
    var records = storageGetAll();
    pastData = records[selectedKey] || null;
  }

  var btn = document.getElementById('earnRunBtn');
  var sp = document.getElementById('earnSp');
  var txt = document.getElementById('earnRunTxt');

  btn.disabled = true;
  sp.style.display = 'block';
  txt.textContent = '分析中...';
  document.getElementById('earnResults').style.display = 'none';

  try {
    var result;

    if (APP_CONFIG.analysisMode === 'backend') {
      result = await analyzeEarningsWithBackend({
        stockCode: stockCode,
        companyName: companyName,
        useType: earnUseType,
        pastData: pastData,
        files: earnFiles
      });
    } else {
      await fakeDelay(900);
      result = buildDummyEarningsResult({
        stockCode: stockCode,
        companyName: companyName,
        useType: earnUseType,
        pastData: pastData,
        files: earnFiles
      });
    }

    renderEarningsResult(result, pastData);
  } catch (e) {
    document.getElementById('earnErr').textContent = 'エラー: ' + (e.message || e);
    document.getElementById('earnErr').classList.add('on');
  } finally {
    btn.disabled = false;
    sp.style.display = 'none';
    txt.textContent = '🤖 決算を分析する';
  }
}

/* ===== 決算結果描画 ===== */
function renderEarningsResult(r, pastData) {
  var verdictMap = {
    '保有継続': { cls: 'hold', ico: '✅', lbl: '保有継続' },
    '一部利確検討': { cls: 'partial', ico: '⚠️', lbl: '一部利確検討' },
    '撤退検討': { cls: 'exit', ico: '🚨', lbl: '撤退検討' },
    '新規候補として有望': { cls: 'newbuy', ico: '⭐', lbl: '新規候補として有望' },
    '条件付き検討': { cls: 'partial', ico: '🟡', lbl: '条件付き検討' },
    '見送り': { cls: 'exit', ico: '❌', lbl: '見送り' }
  };

  var vd = verdictMap[r.verdict] || {
    cls: 'partial',
    ico: '📋',
    lbl: r.verdict || '判定中'
  };

  function kpiCard(label, kpi) {
    if (!kpi) return '';

    var cls = kpi.result === 'pass' ? 'pass' : kpi.result === 'fail' ? 'fail' : 'watch';
    var icon = kpi.result === 'pass' ? '✅' : kpi.result === 'fail' ? '❌' : '⚠️';

    return '' +
      '<div class="earn-kpi ' + cls + '">' +
        '<div class="earn-kpi-badge">' + icon + ' ' +
          (kpi.result === 'pass' ? '良好' : kpi.result === 'fail' ? '要注意' : '注視') +
        '</div>' +
        '<div class="earn-kpi-label">' + escapeHtml(label) + '</div>' +
        '<div class="earn-kpi-val">' + escapeHtml(kpi.progressRate || kpi.change || '—') + '</div>' +
        '<div class="earn-kpi-sub">' +
          (kpi.actual ? '実績: ' + escapeHtml(kpi.actual) + '<br>' : '') +
          (kpi.forecast ? '通期予想: ' + escapeHtml(kpi.forecast) + '<br>' : '') +
          (kpi.yoyChange ? '前年同期比: ' + escapeHtml(kpi.yoyChange) + '<br>' : '') +
          (kpi.newForecast ? '修正後: ' + escapeHtml(kpi.newForecast) + '<br>' : '') +
          escapeHtml(kpi.note || '') +
        '</div>' +
      '</div>';
  }

  var diffHtml = '';
  if (r.diffFromPast && r.diffFromPast.length > 0 && pastData) {
    diffHtml = '' +
      '<div class="earn-section" style="margin-bottom:14px">' +
        '<div class="earn-sec-h">' +
          '<div class="earn-sec-ico" style="background:rgba(245,166,35,.12)">📊</div>' +
          '<div class="earn-sec-ttl">前回分析との差分</div>' +
        '</div>' +
        '<div style="padding:12px 16px">' +
          '<table class="diff-table">' +
            '<thead>' +
              '<tr><th>項目</th><th>前回</th><th>今回</th><th>変化</th></tr>' +
            '</thead>' +
            '<tbody>' +
              r.diffFromPast.map(function(d) {
                var dir = d.direction === 'up'
                  ? '<span class="diff-up">↑ 改善</span>'
                  : d.direction === 'down'
                  ? '<span class="diff-down">↓ 悪化</span>'
                  : '<span class="diff-neutral">→ 変化なし</span>';

                return '' +
                  '<tr>' +
                    '<td>' + escapeHtml(d.item || '—') + '</td>' +
                    '<td style="color:#8b949e">' + escapeHtml(d.before || '—') + '</td>' +
                    '<td>' + escapeHtml(d.after || '—') + '</td>' +
                    '<td>' + dir + '</td>' +
                  '</tr>';
              }).join('') +
            '</tbody>' +
          '</table>' +
        '</div>' +
      '</div>';
  }

  var html = '' +
    '<div style="background:#161b22;border:1px solid #30363d;border-radius:10px;padding:14px 16px;margin-bottom:14px">' +
      '<div style="font-size:12px;color:#8b949e;margin-bottom:4px">' +
        escapeHtml((r.companyName || '') + ' ' + (r.stockCode || '') + '　' + (r.fiscalPeriod || '') + '　' + (r.settlementDate || '')) +
      '</div>' +
      '<div style="font-size:13px;color:#c9d1d9;line-height:1.7">' + escapeHtml(r.summary || '') + '</div>' +
      (r.qualityNote
        ? '<div style="font-size:12px;color:#8b949e;margin-top:6px;padding:6px 10px;background:#21262d;border-radius:6px">📎 利益の質: ' + escapeHtml(r.qualityNote) + '</div>'
        : '') +
    '</div>' +

    '<div class="earn-kpi-grid">' +
      kpiCard('売上高進捗', r.revenue) +
      kpiCard('営業利益進捗', r.operatingProfit) +
      kpiCard('ガイダンス', r.guidance) +
      (r.dividend
        ? '<div class="earn-kpi ' + (r.dividend.change === '増配' ? 'pass' : r.dividend.change === '減配' ? 'fail' : 'watch') + '">' +
            '<div class="earn-kpi-label">配当</div>' +
            '<div class="earn-kpi-val">' + escapeHtml(r.dividend.change || '—') + '</div>' +
            '<div class="earn-kpi-sub">' + escapeHtml((r.dividend.newAmount || '') + ' ' + (r.dividend.note || '')) + '</div>' +
          '</div>'
        : '') +
    '</div>' +

    diffHtml +

    '<div class="earn-verdict ' + vd.cls + '">' +
      '<div class="earn-verdict-ico">' + vd.ico + '</div>' +
      '<div class="earn-verdict-ttl">' + escapeHtml(vd.lbl) + '</div>' +
      '<div class="earn-verdict-reason">' + escapeHtml(r.verdictReason || '') + '</div>' +
      '<div class="earn-action-box">' +
        '<div class="earn-action-box-lbl">▶ 翌日のアクション</div>' +
        escapeHtml(r.nextAction || '—') +
      '</div>' +
    '</div>';

  var el = document.getElementById('earnResults');
  el.innerHTML = html;
  el.style.display = 'block';
  el.scrollIntoView({ behavior: 'smooth' });
}

/* ===== 初期化 ===== */
function initApp() {
  loadSidebarOrder();
  refreshSidebar();

  var savedModel = localStorage.getItem('funda_model');
  if (savedModel === 'opus' || savedModel === 'sonnet') {
    setModel(savedModel);
  } else {
    setModel('sonnet');
  }

  var codeInput = document.getElementById('codeInput');
  if (codeInput) {
    codeInput.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') runAnalysis();
    });
  }

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      closeSidebar();
      closeConfirm();
    }
  });
}

setAnalysisMode('backend');
setBackendUrls(
  '/api/analyze',
  '/api/earnings'
);

initApp();
</script>
